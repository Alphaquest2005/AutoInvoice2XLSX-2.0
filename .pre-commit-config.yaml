repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: Ruff lint
        entry: ruff check src/ tests/ --fix
        language: system
        types: [python]
        pass_filenames: false
      - id: ruff-format
        name: Ruff format
        entry: ruff format src/ tests/
        language: system
        types: [python]
        pass_filenames: false
      - id: mypy
        name: mypy type check
        entry: mypy src/
        language: system
        types: [python]
        pass_filenames: false
      - id: pytest-fast
        name: pytest (unit tests only)
        entry: pytest -x -q tests/domain/ tests/fakes/ -m "not slow and not integration"
        language: system
        types: [python]
        pass_filenames: false
