# Auto-generated format spec for amazon
# Generated on 2026-04-15T17:35:21.555232
# Will be promoted to formats/ on successful processing

name: amazon
version: "1.0"
description: "Amazon.com order invoice"

detect:
  all_of:
    - "Amazon.com"
    - "Order Summary"
  any_of:
    - "amazon.com/gp/css/summary/print.html"
    - "orderID="

metadata:
  invoice_number:
    patterns:
      - 'orderID\s*=\s*(\d{3}-\d{7}-\d{7})'
      - 'Order\s+(\d{3}-\d{7}-\d{7})'
    required: true
  date:
    patterns:
      - '(\d{1,2}\s+\d{1,2}\s*,\s*\d{1,2}\s+\d{4})\s+\d{1,2}:\d{2}\s*(?:AM|PM)'
  supplier_name:
    value: "Amazon.com"
  country_code:
    value: "US"
  total:
    patterns:
      - 'Grand\s+Total\s*:\s*USD\s*([\d,]+\.\d{2})'
    type: currency

items:
  strategy: line
  line:
    pattern: '(.+?)\s+USD\s*([\d,]+\.\d{2})'
    field_map:
      description: 1
      unit_price: 2
    types:
      unit_price: currency
    skip_patterns:
      - '^Estimated tax'
      - '^Grand Total'
      - '^Payment Grand Total'
      - '^Your Coupon Savings'
      - '^Conditions of Use'
      - '^Privacy Notice'
      - '^Back to top'
      - '^To view the status'
      - '^Consumer Health'
      - '^Your Ads Privacy'
      - '^©'
      - '^nttps'
      - '^Billing address'
      - '^United States'
      - '^\d{3}-\d{7}-\d{7}'

sections:
  items_start:
    - "Billing address"
  items_end:
    - "Grand Total"

validation:
  min_items: 0