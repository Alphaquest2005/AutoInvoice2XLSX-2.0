# Auto-generated format spec for amazon
# Generated on 2026-04-12T11:58:00.444221
# Will be promoted to formats/ on successful processing

name: amazon
version: "1.0"
description: "Amazon.com order invoice"

detect:
  all_of:
    - "amazon.com"
    - "order number"
  any_of:
    - "Items Ordered"
    - "Order Total"

metadata:
  invoice_number:
    patterns:
      - '(\d{3}\s*-\s*\d{7}\s*-\s*\d{7})'
    required: true
  date:
    patterns:
      - 'Order Placed\s*:\s*(\w+\s+\d{1,2}\s*,?\s*\d{4})'
      - 'Shipped on\s+(\w+\s+\d{1,2}\s*,?\s*\d{4})'
  supplier_name:
    value: "Amazon.com"
  country_code:
    value: "US"
  total:
    patterns:
      - 'Grand Total\s*:\s*USD\s*([\d,]+\.\d{2})'
      - 'Order Total\s*:\s*USD\s*([\d,]+\.\d{2})'
    type: currency

items:
  strategy: line
  line:
    pattern: '^(\d+)\s+of\s*:\s*(.+?)\s+\$([\d,]+\.\d{2})\s*$'
    field_map:
      quantity: 1
      description: 2
      unit_price: 3
    types:
      quantity: integer
      unit_price: currency
    skip_patterns:
      - '^Sold by'
      - '^Supplied by'
      - '^Condition'
      - '^Shipping Address'
      - '^Payment'
      - '^Visa ending'
      - '^Free Shipping'
      - '^Billing address'
      - '^Credit Card'
      - '^item\s*\(s\)'
      - '^Subtotal'
      - '^Shipping & Handling'
      - '^Total before tax'
      - '^Estimated tax'
      - '^Grand Total'
      - '^Payment Grand Total'
      - '^To view'
      - '^Conditions of Use'
      - '^Back to'
      - '^United States'

sections:
  items_start:
    - "Items Ordered"
  items_end:
    - "Shipping Address"

validation:
  min_items: 1
  max_item_price: 100000