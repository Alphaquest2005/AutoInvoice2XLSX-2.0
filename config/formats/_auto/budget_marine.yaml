    pattern: '^\s*(\d+)\s+(.*?)\s+([\d,]+\.?\d*)\s+([\d,]+\.?\d*)\s+([\d,]+\.?\d*)\s*$'
    field_map:
      quantity: 1
      description: 2
      unit_price: 5
    types:
      quantity: integer
      unit_price: currency
    skip_patterns:
