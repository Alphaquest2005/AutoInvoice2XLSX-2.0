    - "Free returns within 90 days"
    - "Item details"
  any_of:
    - "By @"
    - "By"

metadata:
  invoice_number:
    patterns:
      - 'Order\s*[:#]?\s*(\d+)'
      - 'Invoice\s*[:#]?\s*(\d+)'
      - '#\s*(\d+)'
    required: false
  date:
    patterns:
      - '\d{1,2}/\d{1,2}/\d{2,4}'
      - '\d{4}-\d{2}-\d{2}'
  supplier_name:
    value: "unknown_compact"
  country_code:
    value: "US"
  total:
    patterns:
      - 'Total[:\s]*\$?([\d,]+\.\d{2})'
      - 'Grand Total[:\s]*\$?([\d,]+\.\d{2})'
      - 'Amount Due[:\s]*\$?([\d,]+\.\d{2})'
    type: currency

items:
  strategy: line
  line:
    pattern: '^(.+?)\s+\$?([\d,]+\.\d{2})\s*$'
    field_map:
      description: 1
      unit_price: 2
    types:
      unit_price: currency
    skip_patterns:
      - '^Page \d+/\d+'
      - '^Free returns'
      - '^Item details'
