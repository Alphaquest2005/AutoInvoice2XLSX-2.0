# Alibaba.com Marketplace Facilitator Invoice
#
# Covers the CNY/USD marketplace-facilitator style invoices issued by
# "Singapore E-Commerce Private Limited" for multiple Alibaba.com stores
# (SZREBOW, ZBLED, etc.). These are OCR-heavy and carry the Grenada VAT line
# "Total $CURRENCY of Sales Tax" rather than a simple "Total:" label.
#
# Schema reference: pipeline/format_parser.py _extract_items_line()
#   items.line.pattern        — primary single regex
#   items.line.extra_patterns — optional alternates (used if primary misses)
#   items.line.field_map      — capture group index per field
#   items.line.skip_patterns  — drop rows
#   items.line.generated_fields
#
# Written 2026-04-17 from the working _deprecated_alibaba_com_store.yaml
# baseline with the OCR-normalisation + detect improvements from the prior
# corrupted revision folded back in.

name: alibaba_marketplace_invoice
version: "2.0"
description: "Alibaba.com marketplace facilitator invoices (Singapore E-Commerce)"
priority: 10

detect:
  all_of:
    - "Marketplace Facilitator"
  any_of:
    - "Alibaba.com"
    - "alibaba.com"
    - "Singapore E-Commerce"

ocr_normalize:
  - pattern: '(?<=\d);'
    replace: ')'
    description: "Fix OCR semicolon after number: 190.00; → 190.00)"
  - pattern: 'Supplter'
    replace: 'Supplier'
    description: "Fix OCR: Supplter → Supplier"

metadata:
  invoice_number:
    patterns:
      - 'Invoice No\.\s*[\n\s]+([A-Z0-9]+)'
      - '(BLOMZFL\d{11,})'
      - '(BIOMZFL\d+)'
      - '(B[A-Z0-9]{15,})'
    required: false

  date:
    patterns:
      - '(\d{4}-\d{2}-\d{2})\s*-?\d{4}'
      - '(\d{4}-\d{2}-\d{2})'
      - '([A-Z][a-z]{2}\s[A-Z][a-z]{2}\s\d{1,2}\s\d{4})'

  supplier_name:
    patterns:
      - 'Supplier name\s+(.+?)(?:\s+Customer|\s*$)'
    required: false

  country_code:
    value: "SG"

  total:
    patterns:
      - 'Total\s+\w+\s+of\s+Sales\s+Tax[^)]*\)\s*([\d,]+\.?\d*)'
      - 'Total amount in (?:USD|CNY)\s*:?\s*[\d,.]+\s+([\d,.]+)[);]?\s*$'
      - 'Total amount in (?:USD|CNY)\s*:?\s*([\d,.]+)[);]?\s*$'
    type: currency

items:
  strategy: line
  line:
    # Primary: "<description-text>   <unit-price>  " pattern — matches the
    # deprecated working format. Description is a 20-150 char run up to a
    # price with up to 2 decimals.
    pattern: '^([\s\S]{20,150}?)\s+(\d+\.?\d{0,2})\s+'
    field_map:
      description: 1
      unit_price: 2
    types:
      unit_price: currency

    # Alternates for OCR-garbled rows.
    extra_patterns:
      # "1pc 183.69) 7.000 %"  — quantity + price on one line, trailing tax %
      - name: qty_price_tax
        regex: '(\d+)\s*[Pp][Ce]\s+([\d,]+\.\d{2})[);]\s*[\d.]+\s*%'
        field_map:
          quantity: 1
          unit_price: 2
      # "183.69)" — orphan price (tax column on next line)
      - name: price_only
        regex: '^([\d,]+\.\d{2})[);]\s*[\d.]+\s*%'
        field_map:
          unit_price: 1

    skip_patterns:
      - '^\s*$'
      - '^Supplier name'
      - '^Marketplace Facilitator'
      - '^Delivery Address'
      - '^Customer Name'
      - '^Transaction'
      - '^BLOMZFL'
      - '^BIOMZFL'
      - '^\d{4}-\d{2}-\d{2}'
      - '^\(CNY\)'
      - '^\(USD\)'
      - '^Sales Tax'
      - 'Total amount'
      - 'Total inclusive'
      - 'Sales Tax Rate'
      - 'Currency Converter'
      - 'Chinese Yuan'
      - 'US Dollars'
      - 'Sign In'
      - 'Amazon\.com'
      - 'converter/convert'
      - 'Invoice No\.'
      - 'required by'
      - 'tax authorities'
      - '^Quantity'
      - '^Sub total'
      - '^Total'

    generated_fields:
      sku: "ALI-{index}"
      quantity: 1

sections:
  items_start:
    - "Transaction"
    - "Price"
    - "Sales Tax"
    - "Delivery Address"
    - "Sales Tax Rate"
  items_end:
    - "Total amount"
    - "Total inclusive"
    - "required by"
    - "tax authorities"
    - "Sub total"

ocr_config:
  dpi: 400
  psm: 6
  preprocessing: none

validation:
  min_items: 1
  max_item_price: 5000
