# Amazon Invoice Format Specification
# All Amazon-specific parsing rules are isolated here
# Changes here affect ONLY Amazon invoices

name: amazon
version: "1.0"
description: "Amazon.com order invoices (print view)"

# ‚îÄ‚îÄ‚îÄ Detection ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
# This format handles Amazon order details pages.
#
# Detection accepts ANY of several amazon-specific phrases ‚Äî we deliberately
# do NOT require "Items Ordered" as a hard prerequisite because OCR often
# mangles that header (e.g. "as Ordered Price"), which previously caused
# detection to fall through to LLM auto-generation and produce bogus item
# rows from the totals footer (HAWB9421183 / 113-3799251-0582608).
#
# `none_of` excludes eBay, which also uses "Sold by" and "Order total"
# wording but has its own format spec.
detect:
  any_of:
    - "Items Ordered"              # original literal (clean text)
    - "Final Details for Order"    # amazon order-details page header (OCR-stable)
    - "Amazon.com order number"    # body label
    - "amazon.com order number"    # case variant
    - "amazon . com order number"  # OCR-spaced variant
  none_of:
    - "Items bought from"          # eBay marker ‚Äî exclude eBay invoices

# ‚îÄ‚îÄ‚îÄ OCR Normalization ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
# Applied BEFORE parsing, in order listed
# These fix common OCR artifacts specific to Amazon printouts
ocr_normalize:
  - pattern: '(\d+)\s+(\d{2})(?=\s*[\}\)\|\s]*$)'
    replace: '\1.\2'
    description: "Fix space-separated prices: $39 99 ‚Üí $39.99"

  - pattern: '(USD\s+\d+),(\d{2})'
    replace: '\1.\2'
    description: "Fix OCR comma-as-decimal in USD amounts: USD 0,79 ‚Üí USD 0.79"

  - pattern: '\$(\d+),(\d{2})(?!\d)'
    replace: '$\1.\2'
    description: "Fix OCR comma-as-decimal in $ amounts: $0,79 ‚Üí $0.79"

  - pattern: '(\d+)\s+of\s+[;:]'
    replace: '\1 of:'
    description: "Fix OCR space before colon/semicolon: 1 of : ‚Üí 1 of:, 1 of ; ‚Üí 1 of:"

  - pattern: '(\d+)\s+of;'
    replace: '\1 of:'
    description: "Fix OCR misread semicolon: 3 of; ‚Üí 3 of:"

  - pattern: '(\d+)\s+g&'
    replace: '\1 of:'
    description: "Fix OCR misread: 3 g& ‚Üí 3 of: (common OCR corruption of 'of:')"

  - pattern: '([Il])(?=\s+of[;:])'
    replace: '1'
    description: "Fix OCR misread quantity: I of: ‚Üí 1 of:"

  - pattern: '\$(\d+)\s*[\(\[]\s*(\d{2})\s*[¬∞\)\]]*'
    replace: '$\1.\2'
    description: "Fix OCR-corrupted price: $39 ( 99 ¬∞ ‚Üí $39.99"

  - pattern: 'Sotd by'
    replace: 'Sold by'
    description: "Fix OCR misread: Sotd ‚Üí Sold"

  - pattern: 'Sold by\s+:'
    replace: 'Sold by:'
    description: "Fix OCR space before colon: Sold by : ‚Üí Sold by:"

  - pattern: 'Supplied by\s+:'
    replace: 'Supplied by:'
    description: "Fix OCR space before colon: Supplied by : ‚Üí Supplied by:"

  - pattern: '(\d{3})\s+-\s+(\d{7})\s+-\s+(\d{7})'
    replace: '\1-\2-\3'
    description: "Fix OCR-spaced order number: 112 - 9925042 - 2903468 ‚Üí 112-9925042-2903468"

  - pattern: '\s*[\}\)\|]+\s*$'
    replace: ''
    flags: multiline
    description: "Remove trailing OCR noise from lines"

# ‚îÄ‚îÄ‚îÄ Metadata Extraction ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
# Each field tries patterns in order, first match wins
metadata:
  invoice_number:
    patterns:
      - 'Order\s*#?\s*:?\s*(\d{3}\s*-\s*\d{7}\s*-\s*\d{7})'
      - 'order\s*number[:\s]+(\d{3}\s*-\s*\d{7}\s*-\s*\d{7})'
    required: true

  date:
    patterns:
      - 'Order\s+[Pp]laced[:\s]+(\w+\s+\d{1,2},?\s+\d{4})'
      - 'Order\s+[Dd]ate[:\s]+(\w+\s+\d{1,2},?\s+\d{4})'

  supplier_name:
    value: "Amazon.com"  # Static value, no pattern needed

  country_code:
    value: "US"

  total:
    patterns:
      # USD format (primary) ‚Äî \s* before : handles OCR "Grand Total :"
      - 'Grand\s+Total\s*:\s*(?:USD\s+)?\$?([\d,]+\.\d{2})'
      # USD Order Total ‚Äî before XCD patterns to prefer USD
      - 'Order\s+[Tt]otal\s*:\s*(?:USD\s+)?\$?([\d,]+\.\d{2})'
      # XCD format: "Grand Total: XCD 1,518.83" but NOT "Payment Grand Total"
      - '(?<!Payment\s)Grand\s+Total\s*:\s*XCD\s+([\d,]+\.\d{2})'
    type: currency

  subtotal:
    patterns:
      # USD format ‚Äî handles OCR "Item ( s ) Subtotal :"
      - 'Item\s*\(\s*s\s*\)\s+Subtotal\s*:\s*(?:USD\s+)?\$?([\d,]+\.\d{2})'
      # XCD format
      - 'Item\s*\(\s*s\s*\)\s+Subtotal\s*:\s*XCD\s+([\d,]+\.\d{2})'
    type: currency

  tax:
    patterns:
      # USD format
      - 'Estimated\s+tax[^:]*:\s*(?:USD\s+)?\$?([\d,]+\.\d{2})'
      # Split-line: "Estimated tax to be $57.29\ncollected:" (amount before colon)
      - 'Estimated\s+tax\s+to\s+be\s+\$?([\d,]+\.\d{2})'
      # XCD format: "Estimated tax to be collected: XCD 0.00"
      - 'Estimated\s+tax\s+to\s+be\s+collected:\s*XCD\s+([\d,]+\.\d{2})'
      # Positional fallback: 4th USD value in payment block (subtotal, shipping, before-tax, TAX)
      - 'USD\s+[\d,]+\.\d{2}\nUSD\s+[\d,]+\.\d{2}\n\nUSD\s+[\d,]+\.\d{2}\nUSD\s+([\d,]+\.\d{2})'
    type: currency
    default: 0

  shipping:
    patterns:
      # USD format (OCR may swap period/comma: "9,31" vs "9.31")
      - 'Shipping\s*(?:&|and)\s*Handling\s*:\s*(?:USD\s+)?\$?([\d,]+[.,]\d{2})'
      # XCD format: "Shipping & Handling: XCD 0.00"
      - 'Shipping\s*(?:&|and)\s*Handling\s*:\s*XCD\s+([\d,]+[.,]\d{2})'
      # Positional fallback: 2nd USD value in payment block (subtotal, SHIPPING)
      - 'USD\s+[\d,]+\.\d{2}\nUSD\s+([\d,]+\.\d{2})\n\nUSD'
    type: currency

  credits:
    patterns:
      # \s* after -? handles OCR newline/space: "Coupon Savings :\n- USD 12.00"
      - '(?:Your\s+)?Coupon\s+Savings\s*:?\s*-?\s*(?:XCD\s+|USD\s+)?\$?([\d,]+\.\d{2})'
      - 'Gift\s+Card\s+Amount\s*:?\s*-?\s*(?:XCD\s+|USD\s+)?\$?([\d,]+\.\d{2})'
      - 'Promoti(?:on|onal)\s+(?:Applied|Credit)\s*:?\s*-?\s*(?:XCD\s+|USD\s+)?\$?([\d,]+\.\d{2})'
    type: currency
    aggregate: sum

  other_cost:
    patterns:
      # XCD format: "Exchange rate guarantee fee:\nXCD 15.04" or "Exchange rate\nXCD 15.04\nguarantee fee:"
      - 'Exchange\s+rate[^X]*XCD\s+([\d,]+\.\d{2})'
      # USD format: "Exchange rate guarantee fee: USD 5.56"
      - 'Exchange\s+rate\s+(?:guarantee\s+fee:?\s*)?(?:XCD|USD)\s+([\d,]+\.\d{2})'
      # Fallback: just "guarantee fee: XCD 15.04"
      - 'guarantee\s+fee:\s*(?:XCD|USD)\s+([\d,]+\.\d{2})'
    type: currency
    aggregate: sum

  discount:
    patterns:
      # Supplier-specific percentage discounts: "eos 20% off: -$47.88"
      - '\w+\s+\d+%\s+off\s*:?\s*-?(?:XCD\s+|USD\s+)?\$?([\d,]+\.\d{2})'
      # Generic "discount" or "savings" lines
      - '(?:Subscribe|Save)\s*(?:&|and)\s*Save\s*:?\s*-?(?:XCD\s+|USD\s+)?\$?([\d,]+\.\d{2})'
    type: currency
    aggregate: sum

  free_shipping:
    patterns:
      - 'Free\s+Shipping\s*:?\s*-?\s*(?:XCD\s+|USD\s+)?\$?([\d,]+\.\d{2})'
    type: currency
    aggregate: sum

# ‚îÄ‚îÄ‚îÄ Item Extraction ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
items:
  # Strategy: "block" = items span multiple lines with start/end markers
  # Amazon OCR produces: "N of: Description..." possibly over multiple lines
  # Then "Price" and "$XX.XX" on separate lines
  # Also handles Order Details format: "Delivered [date]" block ending with price
  strategy: block

  block:
    # Start pattern: either "N of:" (print view) OR "Delivered" (Order Details page)
    start_pattern: '^\d+\s+of[;:]|Delivered\s+\w+'
    # End pattern: standalone price line "$XX.XX", or price embedded in line,
    # or section terminators that indicate end of item block
    end_pattern: '^\$[\d,]+(?:[.\s]\d{2})?$|(?:USD\s+|XCD\s+|\$)[\d,]+\.\d{2}\s*$'

    # Skip these lines within blocks
    skip_patterns:
      - '^-?\s*Sold by'
      - '^-?\s*Supplied by'
      - '^Condition'
      - '^Price$'
      - '^Return '
      - '^Shipping Address'
      - '^Shipping Speed'
      - '^FREE Shipping'
      - '^FREE Prime'
      - '^Standard Shipping'
      - '^\d+\s+NW\s+'
      - '^MIAMI'
      - '^United States'
      - '^Shipped on '
      - '^Items Ordered'
      - '^https?://'
      - '^\d+/\d+/\d+,\s+\d+:\d+'
      - '^Amazon\.com\s*-\s*Order'
      - 'C/o CaribConex'
      - '^Shipping Speed'
      - '^Kerry'
      - '^GRE\s+\d'

    # Field extraction from combined block text
    fields:
      sku:
        generate: "AMZ-{index}"

      quantity:
        pattern: '^(\d+)\s+of[;:]'
        type: integer
        default: 1

      description:
        # Description is text after "N of:" ‚Äî try with $ delimiter first,
        # then fall back to capturing everything after "N of:" and cleaning
        patterns:
          - '^\d+\s+of[;:]\s+([\s\S]+?)(?:\s*Price\s*|\s*\$)'
          - '^\d+\s+of[;:]\s+(.+(?:\n.+)*)'
        clean:
          - pattern: '\s*[¬©\}\)\|\*#~]+\s*'
            replace: ''
          - pattern: '\s+'
            replace: ' '
          - pattern: '\s*,?\s*$'
            replace: ''

      unit_price:
        # Try $ format first, then USD/XCD format
        pattern: '(?:\$|USD\s+|XCD\s+)([\d,]+(?:[.\s]\d{2})?)'
        type: currency
        default: 0

    types:
      quantity: integer
      unit_price: currency

# ‚îÄ‚îÄ‚îÄ Section Markers ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
# Used to identify where items section starts/ends
sections:
  items_start:
    - "Items Ordered"
    - "Order Details"

  items_end:
    - "Payment information"
    - "Payment method"
    - "Conditions of Use"

# ‚îÄ‚îÄ‚îÄ Balance items ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
# Some Amazon invoice variants have prices only in the payment section,
# not in the item blocks.  balance_items fills zero-price items from
# the invoice subtotal so they survive the zero-value filter.
balance_items: true

# ‚îÄ‚îÄ‚îÄ Validation ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
validation:
  # Sanity checks after parsing
  min_items: 1
  max_item_price: 10000
  require_total: false  # Amazon sometimes doesn't show total clearly
