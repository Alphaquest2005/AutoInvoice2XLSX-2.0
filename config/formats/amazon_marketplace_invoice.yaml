# Auto-generated format spec for address
# Generated on 2026-03-17T03:56:07.637532
# Will be promoted to formats/ on successful processing

name: amazon_marketplace_invoice
version: "1.0"
description: "Invoice format for Amazon marketplace orders featuring 'Order Information', 'Invoice Detail', and 'Sold By' sections."

detect:
  all_of:
    - "Order Information"
    - "Invoice Detail"
    - "Sold By:"
  any_of:
    - "Grand Total:"
    - "Order Number;"
  none_of:
    - "Seller Information"

metadata:
  invoice_number:
    patterns:
      - 'Order Number;\s*([A-Z0-9]+)'
    required: true
  date:
    patterns:
      - 'Order Date:\s*(\d{4}-\d{2}-\d{2})'
  supplier_name:
    patterns:
      - 'Sold By:\s*(.+?)(?:\s+Address:|$)'
  country_code:
    value: "US"
  total:
    patterns:
      - 'Grand Total:\s*([\d,]+\.\d{2})'
    type: currency

items:
  strategy: line
  line:
    pattern: '^(.+?)\s+(\d+)\s+([\d,]+\.\d{2})$'
    field_map:
      description: 1
      quantity: 2
      unit_price: 3
    types:
      quantity: integer
      unit_price: currency
    skip_patterns:
      - '^Item\(s\) Subtotal:'
      - '^Shipping/Handling:'
      - '^Sales Tax:'
      - '^Grand Total:'
      - '^Description\s+Quantity'

sections:
  items_start:
    - "Invoice Detail"
  items_end:
    - "Grand Total:"

validation:
  min_items: 1