name: amazon_web_invoice
version: "1.0"
description: "Amazon.com order invoice format typically found in 'Print this page' HTML views"

detect:
  all_of:
    - "Amazon.com"
    - "Order Placed:"
  any_of:
    - "Amazon.com order number:"
    - "Final Details for Order #"

metadata:
  invoice_number:
    patterns:
      - 'Order\s+#?:?\s*([0-9]{3}-[0-9]{7}-[0-9]{7})'
    required: true
  date:
    patterns:
      - 'Order Placed:\s+([A-Za-z]+\s+\d{1,2},\s+\d{4})'
      - '(\d{1,2}/\d{1,2}/\d{2,4})'
  supplier_name:
    value: "Amazon"
  country_code:
    value: "US"
  total:
    patterns:
      - 'Grand Total:\s+(?:USD\s+)?\$?([\d,]+\.\d{2})'
    type: currency

items:
  strategy: line
  line:
    pattern: '^\s*(?:of:\s*)?(.+?)\s+\$([\d,]+\.\d{2})\s*$'
    field_map:
      description: 1
      unit_price: 2
    types:
      unit_price: currency
    skip_patterns:
      - '^Sold by:'
      - '^Supplied by:'
      - '^Condition:'
      - '^Shipped on'
      - '^Shipping Speed:'
      - '^Payment information'
      - '^Payment Method:'
      - '^Item\(s\) Subtotal:'
      - '^Shipping & Handling:'
      - '^Free Shipping:'
      - '^Total before tax:'
      - '^Estimated tax'
      - '^Grand Total:'
      - '^Credit Card transactions'
    generated_fields:
      quantity: 1

sections:
  items_start:
    - "Sold by"
    - "Shipped on"
  items_end:
    - "Shipping Address:"
    - "Payment information"

validation:
  min_items: 1
  max_item_price: 10000