  country_code:
    value: "US"
  total:
    patterns:
      - 'Total Due\s+\$?([\d,]+\.\d{2})'
    type: currency

items:
  strategy: line
  line:
    pattern: '^(.+?)\s+\/\s+(.+?)\s+\$([\d,]+\.\d{2})$'
    field_map:
      description: 1
      size: 2
      unit_price: 3
    types:
      unit_price: currency
    skip_patterns:
      - '^Subtotal'
      - '^Shipping'
      - '^Tax'
      - '^Discount'
