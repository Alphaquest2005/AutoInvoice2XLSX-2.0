# Auto-generated format spec for aurola_dream_leggings
# Generated on 2026-04-03T23:55:22.518217
# Will be promoted to formats/ on successful processing

name: aurola_dream_leggings
version: "1.0"
description: "Invoice format for AUROLA Dream Leggings with multi-page item lists and email header metadata."

detect:
  all_of:
    - "AUROLA Dream Leggings"
    - "Order Code"
  any_of:
    - "Get in Touch"
    - "From: AUROLA store"

# ─── OCR Normalization ─────────────────────────────────────
ocr_normalize:
  - pattern: '(?m)^[:\s\(\)\u00a2\u2018\u2019]+(?=\S)'
    replace: ''
    description: "Strip leading OCR junk (colons, parens, cent signs) from lines"

metadata:
  invoice_number:
    patterns:
      - 'Order Code\s+(AU\d+)'
      - 'Order from\s+(AU\d+)'
    required: true
  date:
    patterns:
      - 'Date:\s+(\d{1,2}\s+\w+\s+\d{4})'
  supplier_name:
    value: "AUROLA"
  country_code:
    value: "US"
  total:
    patterns:
      - 'Total Due\s+\$?([\d,]+\.\d{2})'
    type: currency

items:
  # Product name ("AUROLA Dream Leggings") appears on a line BEFORE the
  # price line ("Naval Academy / XL $36.99").  Multiline strategy collects
  # description lines until a price-bearing line is found.
  strategy: multiline
  multiline:
    # Price line pattern: "Color / Size $XX.XX" or standalone "$XX.XX"
    price_pattern: '\$([\d,]+\.\d{2})\s*$'
    field_map:
      unit_price: 1
    types:
      unit_price: currency
    description_join: ' '
    min_description_length: 5
    skip_patterns:
      - '^Subtotal'
      - '^Shipping'
      - '^Tax'
      - '^Discount'
      - '^Total Due'
      - '^you saved'
      - '^Order Code'
      - '^Items Price'
      - '^Billing Address'
      - '^Shipping Method'
      - '^Payment Method'
      - '^Get in Touch'
      - '^\s*$'
      - '^From:'
      - '^Subject:'
      - '^To:'
      - '^Date:'
      - '(?i)^Quantity\s*:'
      - '^[:\s\(\)\u00a2]*$'
      - '(?i)^Purchase\s+confirmation'
      - '(?i)^Thanks\s+for'
      - '(?i)^shipp'
      - '(?i)^once\s+they'
      - '(?i)^Get\s+special'
      - '(?i)^GO\s+TO\s+SITE'
      - '(?i)^or\s+View'
      - '^AUROLA$'
      - '(?i)^Help\s+center'
    generated_fields:
      sku: "AUROLA-{index}"

sections:
  items_start:
    - "Order Code"
  items_end:
    - "Subtotal"

balance_items: true

validation:
  min_items: 1
  max_item_price: 1000