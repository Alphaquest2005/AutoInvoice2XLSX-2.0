# Auto-generated format spec for ebay
# Generated by LLM on 2026-02-12T23:09:41.600954
# v1.1 (2026-04-26): added skip_patterns for receipt-header lines that get
#   $-amounts appended when OCR collapses tab columns
#   (Buyer/Seller/Placed on). Fixes HAWB9758348 where "Seller vehicleusa2021
#   ... Shipping $5.99" was misclassified as an item.

_meta:
  purpose: "eBay receipt invoice format spec — extraction patterns and skip rules"
  covers:
    - "Multi-order eBay receipts grouped by 'Items bought from <seller>'"
    - "Read by pipeline.format_registry:FormatRegistry → pipeline.format_parser:FormatParser"
  match_patterns:
    - "ebay"
    - "Items bought from"
    - "Order number"
    - "Order total"
  loader: "pipeline.format_registry:FormatRegistry"

name: ebay
version: "1.1"
description: "Multi-order eBay invoice with itemized sections grouped by supplier"

detect:
  all_of:
    - "Order number"
  any_of:
    - "Items bought from"
    - "items bought from"
    - "Item price"
    - "Order total"

ocr_normalize:
  - pattern: '(?m)^[,;.]\s+(\S)'
    replace: '1 \1'
    description: "Fix OCR qty comma: , SVI -> 1 SVI (OCR misreads 1 as comma)"
  - pattern: '\$(\d+)(\d{2})\s*$'
    replace: '$\1.\2'
    flags: multiline
    description: "Fix missing decimal in price: $6999 -> $69.99"
  - pattern: 'Order number :'
    replace: 'Order number:'
    description: "Fix OCR space before colon: Order number : → Order number:"
  - pattern: '(\d{2})\s+-\s+(\d{5})\s+-\s+(\d{5})'
    replace: '\1-\2-\3'
    description: "Fix OCR-spaced order number: 06 - 11830 - 29458 → 06-11830-29458"
  - pattern: "(?m)^['''\"\\u2018\\u2019]\\s+"
    replace: ''
    description: "Strip leading OCR quote noise from item lines"

metadata:
  invoice_number:
    patterns:
      - 'Order number:\s*([\d][\d\s-]+[\d])'
    required: true
  date:
    patterns:
      - 'Placed on\s+(\w+\s+\d{1,2},\s+\d{4})'
      - 'Paid on\s+(\w+\s+\d{1,2},\s+\d{4})'
  supplier_name:
    value: "eBay"
  country_code:
    value: "US"
  total:
    patterns:
      - 'Order total\s+\$?([\d,]+\.\d{2})'
      - 'Order total\s+(\$?[\d,]+\.\d{2})'
    type: currency

items:
  strategy: multiline
  multiline:
    # Price at end of line: $XX.XX
    price_pattern: '\$([\d,]+\.\d{2})\s*$'
    field_map:
      unit_price: 1
    types:
      unit_price: currency
    description_join: ' '
    min_description_length: 10
    skip_patterns:
      - '^Items bought from'
      - '^items bought from'
      - '^Order number'
      - '^Order information'
      - '^Shipping address'
      - '^Quantity\s+[Ii]?t+em'
      - '^Order total'
      - '^Items\s+\$'
      - '^Shipping'
      - '^Tax'
      # v1.1: receipt-header column lines that get a trailing $-amount when
      # tabs collapse during OCR (HAWB9758348-class regressions).
      - '(?i)^Buyer\b'
      - '(?i)^Seller\b'
      - '(?i)^Placed\s+on'
      - '^\| \d+'
      - '(?i)^Paid\s+on'
      - '(?i)^Payment\s+meth'
      - '(?i)^\*\s*We'
      - '(?i)^Learn\s+more'
      - '(?i)^applicable'
      - '(?i)^sales\s+tax'
      - '(?i)^certain\s+tax'
      - '^\d{5}\s'
      - '^\d+\s*/\s*\d+$'
    clean_fields:
      description:
        - pattern: '\s+(?:USPS|FedEx|UPS)\s+.*$'
          replace: ''
        - pattern: '\s*\(\d{6,}\)\s*'
          replace: ' '
        - pattern: '\s+'
          replace: ' '
    generated_fields:
      quantity: 1
      sku: "EBAY-{index}"

sections:
  items_start:
    - "Items bought from"
    - "items bought from"
    - "Quantity Item name"
    - "Quantity ttem name"
  items_end:
    - "Order total"
    - "Order information"