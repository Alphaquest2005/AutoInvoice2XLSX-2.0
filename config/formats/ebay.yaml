# Auto-generated format spec for ebay
# Generated by LLM on 2026-02-12T23:09:41.600954

name: ebay
version: "1.0"
description: "Multi-order eBay invoice with itemized sections grouped by supplier"

detect:
  all_of:
    - "Order number:"
    - "Items bought from"
  any_of:
    - "Order total"
    - "Item price"

ocr_normalize:
  - pattern: '(?m)^[,;.]\s+(\S)'
    replace: '1 \1'
    description: "Fix OCR qty comma: , SVI -> 1 SVI (OCR misreads 1 as comma)"
  - pattern: '\$(\d+)(\d{2})\s*$'
    replace: '$\1.\2'
    flags: multiline
    description: "Fix missing decimal in price: $6999 -> $69.99"

metadata:
  invoice_number:
    patterns:
      - 'Order number:\s*([\d-]+)'
    required: true
  date:
    patterns:
      - 'Placed on\s+(\w+\s+\d{1,2},\s+\d{4})'
      - 'Paid on\s+(\w+\s+\d{1,2},\s+\d{4})'
  supplier_name:
    value: "eBay"
  country_code:
    value: "US"
  total:
    patterns:
      - 'Order total\s+\$?([\d,]+\.\d{2})'
      - 'Order total\s+(\$?[\d,]+\.\d{2})'
    type: currency

items:
  strategy: line
  line:
    # eBay item lines: "1 Description (SKU) Shipping $price" or "1 Description $price"
    # OCR may mangle the line so we keep the pattern flexible
    pattern: '^\s*(\d+)\s+(.+?)\s+\$(\d[\d,]*\.\d{2})\s*$'
    field_map:
      quantity: 1
      description: 2
      unit_price: 3
    types:
      quantity: integer
      unit_price: currency
    skip_patterns:
      - '^Items bought from'
      - '^Order number:'
      - '^Order information'
      - '^Shipping address'
      - '^Quantity\s+Item name'
      - '^Order total'
      - '^Items\s+\$'
      - '^Shipping'
      - '^Tax'
      - '^\| \d+'

sections:
  items_start:
    - "Items bought from"
    - "items bought from"
    - "Quantity Item name"
  items_end:
    - "Order total"
    - "Order information"