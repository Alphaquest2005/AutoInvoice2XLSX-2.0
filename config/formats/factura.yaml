    pattern: '^([A-Z0-9\-]+)\s+([A-Z0-9\-\/]+)\s+(.+?)\s+(\d+)\s+(\d+)\s+(PZA\.)\s+([\d,]+\.\d+)\s+([\d,]+\.\d{2})$'
    field_map:
      sku: 1
      model: 2
      description: 3
      quantity: 5
      unit_price: 7
      total_price: 8
    types:
      quantity: integer
      unit_price: currency
      total_price: currency
    skip_patterns:
