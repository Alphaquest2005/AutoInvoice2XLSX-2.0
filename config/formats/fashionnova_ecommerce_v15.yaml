# FashionNova invoice format v15 (FINAL)
# Clean description removes "Price:" suffix

name: fashionnova_ecommerce
version: "15.0"
description: "FashionNova invoice - clean description, extract price/qty from context"

detect:
  all_of:
    - "Order #"
    - "Date Placed:"
    - "Total"
    - "Size:"
    - "Qty"
  any_of:
    - "NEED HELP?"
    - "Payment method:"

metadata:
  invoice_number:
    patterns:
      - 'Order #(\d+)'
    required: true
  date:
    patterns:
      - 'Date Placed:\s*([A-Za-z]+ \d{1,2}, \d{4})'
  supplier_name:
    value: "FashionNova"
  country_code:
    value: "US"
  total:
    patterns:
      - 'Total:\s+\$?([\d,]+\.\d{2})'
    type: currency

items:
  strategy: line
  line:
    # Match product name lines (capital letters, no colons)
    pattern: '^(?P<description>[A-Z][A-Za-z0-9\s\-]+)$'
    field_map:
      description: 1
    types:
      description: string
    skip_patterns:
      - '^Order #'
      - '^Date Placed:'
      - '^Size:'
      - '^Qty:'
      - '^Price:'
      - '^Subtotal'
      - '^Total:\s+\$?'
      - '^Shipping'
      - '^Discount'
      - '^Payment method'
      - '^Delivery Address'
      - '^Billing Address'
      - '^FASHION'
      - '^Visit'
      - '^Shop'
      - '^Going Viral'
      - '^\s*$'
      - '^\$[\d,]+\.\d{2}$'
    # Clean description after matching
    clean_fields:
      description:
        - pattern: '\s+Price:\s*$'
          replace: ''
    # Extract price/qty from following lines
    extract_price_from_line: 1
    extract_quantity_from_line: 3
    price_pattern: '^Price:\s*\$(?P<price>[\d,]+\.\d{2})$'
    quantity_pattern: '^Qty:\s*(?P<qty>\d+)$'
    types:
      price: currency
      quantity: integer
    generated_fields:
      sku: "FN-{index}"

sections:
  items_start:
    - "Going Viral"
  items_end:
    - "Subtotal"
    - "Delivery Address"

validation:
  min_items: 1
  max_item_price: 500
