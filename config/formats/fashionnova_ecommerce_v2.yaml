    pattern: '^(?P<description>[A-Z][^\$]+?)\s+\$(?P<unit_price>[\d,]+\.\d{2})(?=[\s\S]*?Size:\s*[A-Z0-9]+.*Oty:\s*(?P<quantity>\d+))?'
    field_map:
      description: 1
