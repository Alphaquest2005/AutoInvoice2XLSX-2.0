# Auto-generated format spec for unknown_order
# Generated by LLM on 2026-02-13T04:09:39.933763

name: koduste_order
version: "1.0"
description: "Order confirmation format for unknown_order supplier (koduste)"

ocr_normalize:
  - pattern: '(\d{2})\s+-\s+(\d{5})\s+-\s+(\d{5})'
    replace: '\1-\2-\3'
    description: "Fix OCR-spaced order number: 03 - 11786 - 67235 → 03-11786-67235"
  - pattern: 'Order number :'
    replace: 'Order number:'
    description: "Fix OCR space before colon"

detect:
  all_of:
    - "Order information"
  any_of:
    - "Items bought from"
    - "items bought from"
    - "Order number"
    - "SpeedPAK"

metadata:
  invoice_number:
    patterns:
      - 'Order number\s*:\s*([\d][\d\s-]+[\d])'
    required: true
  date:
    patterns:
      - 'Placed on\s+([A-Z][a-z]{2}\s+\d{1,2},\s+\d{4})'
  supplier_name:
    value: "koduste"
  country_code:
    value: "US"
  total:
    patterns:
      - 'Order total\s+\$([\d,]+\.\d{2})'
    type: currency

items:
  # Items span multiple lines: description + price on first line,
  # item code / continuation on next line(s).
  # Example OCR:
  #   "1 OPV NISSANRight Upper Lower Door Hinge... USPS Ground $59.98"
  #   "005 (276109893511) Advantage"
  #   "La BBP H5844 Front Disc Brake Hardware Kit (255582491117) USPS First Class $10.27"
  #   "2pcs Right Side... $15.99"
  strategy: multiline
  multiline:
    # Price at end of line: $XX.XX
    price_pattern: '\$([\d,]+\.\d{2})\s*$'
    field_map:
      unit_price: 1
    types:
      unit_price: currency
    description_join: ' '
    min_description_length: 10
    skip_patterns:
      - '^Items bought'
      - '^Order number'
      - '(?i)^Quantity\s+Item'
      - '^Shipping service'
      - '^Order total'
      - '^\(?\d+\)?$'
      - '(?i)^Order\s+information'
      - '(?i)^Buyer\b'
      - '(?i)^Placed\s+on'
      - '(?i)^Payment\s+method'
      - '(?i)^Paid\s+on'
      - '(?i)^Shipping\s+address'
      - '(?i)^Learn\s+more'
      - '(?i)^\*?We.re\s+required'
      - '(?i)^sales\s+tax'
      - '(?i)^certain\s+tax'
      - '^\d{4}$'
      - '^[a-z]{1,4}\s*$'
      - '(?i)^eBay'
      # Skip eBay item continuation lines: item codes, part numbers, shipping details
      - '^\w{2,5}c?\s+\(\d{6,}\)'
      - '^Switch\s+\('
      - '^\d{3,}\s+\(\d{6,}\)'
      - '(?i)\b(?:Advantage|Economy)\b\s*[.:,]*\s*$'
      - '(?i)^Shipping\s+Free'
      - '(?i)^Tax\b'
      - '(?i)^6\s+items'
    clean_fields:
      description:
        # Strip leading OCR-garbled quantity: "1 Se. necoore", "1 or", "1 OPV", "La "
        - pattern: '^\d*\s*(?:Se\.\s*necoore|OEN\w+|or|OPV|La|Vai)\s+'
          replace: ''
        # Strip trailing shipping service info
        - pattern: '\s+(?:USPS|FedEx|UPS)\s+.*$'
          replace: ''
        - pattern: '\s+'
          replace: ' '
    generated_fields:
      quantity: 1
      sku: "EBAY-{index}"

sections:
  items_start:
    - "Items bought from"
    - "items bought from"
  # Note: Do NOT use "Order total" — it appears in the header line BEFORE
  # items_start in some OCR layouts, which makes the section empty.
  # Omit items_end so the section extends to end of text; skip_patterns
  # already filter out non-item lines.

validation:
  min_items: 1
  max_item_price: 10000