# Will be promoted to formats/ on successful processing

name: order_history
version: "1.0"
description: "CoreBridge Order History format"

detect:
  all_of:
    - "ORDER HISTORY"
  any_of:
    - "CoreBridge"
    - "Amount Due"

metadata:
  invoice_number:
    patterns:
      - 'Invoice #\s+Order\s+Description\s+Created Date\s+Completed Date\s+Amount Due\s+Order Total\s+([\d-]+)'
    required: true
  date:
    patterns:
      - 'Completed Date\s+(\d{2}/\d{2}/\d{4})'
  supplier_name:
    value: "CoreBridge"
  country_code:
    value: "US"
  total:
    patterns:
      - 'Invoice Total:\s+\$([\d,]+\.\d{2})'
    type: currency

items:
  strategy: line
  line:
    pattern: '^\d+\s+(\d+)\s+(.+?)\s+(?:Paid[\w ]*|Pending|Refunded|Cancelled|Shipped|Completed|Processing)\s+\$([\d,]+\.\d{2})$'
    field_map:
      quantity: 1
      description: 2
      unit_price: 3
    types:
      quantity: integer
      unit_price: currency
    skip_patterns:
      - '^Product Quantity'
      - '^Sub Total:'
      - '^Sales Tax:'
      - '^Invoice Total:'
      - '^Amount Paid:'
      - '^Amount Due:'
      - '^Order Contact:'
      - '^Prev'
      - '^Next'
      - '^Copyright'
      - '^Terms'
      - '^Privacy'
      - '^https://'

sections:
  items_start:
    - "Product Quantity"
  items_end:
    - "Sub Total:"

validation:
  min_items: 1