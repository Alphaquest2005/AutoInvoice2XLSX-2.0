# Auto-generated format spec for unknown_ry
# Generated by LLM on 2026-02-13T04:05:54.575678

name: puma_north_america
version: "1.1"
description: "Invoice format for PUMA NORTH AMERICA, INC. online orders featuring 'Order Number', 'Shipping & Billing', and 'Ordered Items' sections."
# v1.1 (2026-04-25):
#   * items.line.pattern now allows apostrophes (ASCII ' and curly ’) in
#     descriptions so "Little Kids' Sneakers" / "Men's Sneakers" match.
#   * Description char class no longer includes \n — prevents the next item's
#     line from being absorbed into the previous match's description (which
#     used to leak "IN STOCK\n\n" into the description for items 2..N).
#   * Pattern now captures the actual Quantity from the "Quantity: N" line
#     instead of mapping the description string to quantity (the v1.0 spec
#     had quantity → group 1 which is the description text).
#   * Validated against HAWB9728292 / 00190.pdf (4 items).

detect:
  all_of:
    - "PUMA NORTH AMERICA, INC."
    - "Order details"
    - "Shipping & Billing"
  any_of:
    - "WEB ID:"
    - "Order Number"

metadata:
  invoice_number:
    patterns:
      - 'Order Number\s+([A-Z0-9\-]+)'
    required: true
  date:
    patterns:
      - 'Date ordered:\s+(\d{1,2}/\d{1,2}/\d{4})'
  supplier_name:
    value: "PUMA NORTH AMERICA, INC."
  country_code:
    value: "US"
  total:
    patterns:
      - '(?:Grand Total|Total|Order Total)[\s\.:]+\$?(\d+\.\d{2})'
    type: currency

items:
  strategy: line
  line:
    # ^DESCRIPTION\nColor:...\nQuantity: N\n$PRICE
    # Description: starts at line-start with a letter, allows letters / spaces /
    # tabs / dots / hyphens / apostrophes (ASCII and curly) — but NOT newlines,
    # so a description never bleeds into the previous item's "IN STOCK" tail.
    pattern: "^([A-Za-z][A-Za-z \\t\\.\\-'\u2019]+)\\nColor:[\\s\\S]*?Quantity:\\s*(\\d+)\\s*\\n\\$([0-9]+\\.[0-9]{2})"
    field_map:
      description: 1
      quantity: 2
      unit_price: 3
    types:
      quantity: integer
      unit_price: currency
    skip_patterns:
      - '^(Subtotal|Tax|Shipping|Shipping & Handling|Total|Grand Total|Promotion|Discount)'
      - '^Order Number'
      - '^Date ordered'
      - '^Shipment Method'
      - '^\s*$'
    generated_fields:
      sku: "PUMA-{index}"

sections:
  items_start:
    - "ORDERED ITEMS"
    - "Shipping Method:"
  items_end:
    - "Order Total"
    - "Grand Total"

validation:
  min_items: 1