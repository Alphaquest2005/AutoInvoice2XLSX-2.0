name: rose_amazon_marketplace
version: "1.0"
description: "Invoice format for Rose Amazon Marketplace purchases with itemized product listings and order summary blocks."

detect:
  all_of:
    - "Free returns within 90 days"
    - "Order Summary"
    - "Order ID:"
    - "Rose"
  any_of:
    - "Order total:"
    - "Item(s) total:"

metadata:
  invoice_number:
    patterns:
      - 'Order ID:\s*([A-Z0-9\-]+)'
    required: true
  date:
    patterns:
      - 'Order time:\s*([A-Za-z]{3}\s\d{1,2},\s\d{4})'
      - '(\d{4}/\d{2}/\d{2})'
  supplier_name:
    value: "Rose"
  country_code:
    value: "US"
  total:
    patterns:
      - 'Order total:\s*\$([\d,]+\.\d{2})'
    type: currency

items:
  strategy: line
  line:
    # Matches lines starting with quantity (optional), followed by description and price
    # Handles lines like "1 Product Name ... $10.00" or "Product Name ... $10.00"
    pattern: '^(?:\d+\s+)?(.+?)\s+\$?([\d,]+\.\d{2})(?:\s+\d+)?$'
    field_map:
      description: 1
      unit_price: 2
    types:
      unit_price: currency
    skip_patterns:
      - '^Order Summary'
      - '^Order ID:'
      - '^Order time:'
      - '^Item\(s\) total:'
      - '^Item\(s\) discount:'
      - '^Subtotal:'
      - '^Shipping:'
      - '^Sales tax:'
      - '^Order total:'
      - '^Shipping address'
      - '^Free returns'
      - '^Item details'
      - '^\d+/\d+$' # Page numbers
      - '^@' # Metadata symbols

sections:
  items_start:
    - "Item details"
  items_end:
    - "Order Summary"

validation:
  min_items: 1
  max_item_price: 1000