# Tremeretrue / SA Natural View invoice format
# Handles the standard Tremeretrue order layout: items with name qty $price
# followed by SKU lines, then Items subtotal, Shipping, and Total

name: tremeretrue_invoice
version: "1.1"
priority: 10  # Higher than generic tremeretrue.yaml
description: "Tremeretrue/SA Natural View invoice - line items with name qty $price"

detect:
  all_of:
    - "TREMERETRUE"
  any_of:
    - "Order #"
    - "tremeretrue.company.site"
    - "tremeretruebuzz"
    - "Shipped via USPS"

# OCR normalization
ocr_normalize:
  # Fix common OCR garble in "DYI Supplements" → "DYI Ey et"
  - pattern: 'DYI\s+Ey\s+et'
    replace: 'DYI Supplements'
    description: "Fix OCR: DYI Ey et → DYI Supplements"
  # Remove OCR noise lines between items (garbled product images)
  - pattern: '(?m)^(?:NAN|rt\s+O)[^\n]*$\n?'
    replace: ''
    description: "Remove OCR noise lines: NAN era S, rt O\\EANS etc."

metadata:
  invoice_number:
    patterns:
      - 'Order\s*#\s*([A-Z0-9]+)'
      - 'Order\s*#\s*([A-Z0-9]+(?:Tremeretrue)?)'
    required: true
  date:
    patterns:
      - '([A-Z][a-z]{2}\s+\d{1,2}\s*,\s*\d{4}\s*,\s*\d{1,2}\s*:\s*\d{2}\s*(?:AM|PM))'
      - '([A-Z][a-z]{2}\s+\d{1,2},\s+\d{4},\s+\d{2}:\d{2}\s+[AP]M)'
  supplier_name:
    value: "Tremeretrue"
  country_code:
    value: "US"
  total:
    patterns:
      # Total on its own line
      - 'Total\s*\$\s*([\d,]+\.\d{2})'
      # Items + Shipping + Total on adjacent lines (multiline match)
      - 'Items\s+\$[\d,]+\.\d{2}\s+Shipping\s+\$[\d,]+\.\d{2}\s+(?:Total\s+)?\$?([\d,]+\.\d{2})'
    type: currency
  subtotal:
    patterns:
      - 'Items\s+\$\s*([\d,]+\.\d{2})'
    type: currency
  shipping:
    patterns:
      - 'Shipping\s+\$\s*([\d,]+\.\d{2})'
    type: currency

items:
  strategy: line
  line:
    # Match: description qty $price  (e.g. "SuperRid 1 $40.00")
    pattern: '^([A-Za-z0-9]+(?:\s+[A-Za-z0-9]+)*)\s+(\d+)\s+\$([\d,]+\.\d{2})\s*$'
    field_map:
      description: 1
      quantity: 2
      unit_price: 3
    types:
      quantity: integer
      unit_price: currency
    skip_patterns:
      - '^SKU\s*:'
      - '^Items\s+\$'
      - '^Shipping\s+\$'
      - '^Total\s+\$'
      - '^\s*$'
      - '^TREMERETRUE'
      - '^tremeretrue'
      - '^Order\s*#'
      - '^Ship\s+to'
      - '^Buyer'
      - '^Shipped\s+via'
      - '^Payment'
      - '^United\s+States'
      - '^Grenada'
      - '^\d{5}'
      - '^\+'
      - '@'
      - '^NAN'
      - '^rt\s+O'
    generated_fields:
      sku: "TRU-{index}"

sections:
  items_start:
    - "Order #"
  items_end:
    - "Items"
    - "Shipping"

# When total can't be extracted (e.g. upside-down page), compute from items + shipping
balance_items: true

validation:
  min_items: 1
  max_item_price: 10000
