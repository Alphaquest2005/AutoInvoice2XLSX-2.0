    patterns:
      - 'Document Type\s+PO Number\s+Supplier Invoice#\s+Date'
      - '(\d{4}-\d{3})\s+\S+\s+\S+\s+\w+ \d{1,2}, \d{4}'
    required: false
  date:
    patterns:
      - '(\w+ \d{1,2}, \d{4}, \d{2}:\d{2} [AP]M)'
  supplier_name:
    value: "Tremeretrue"
  country_code:
    patterns:
      - '\b(US)\s+\d{6}\b'
  total:
    patterns:
      - 'INVOICE TOTAL\s+([\d,]+\.\d{2})'
    type: currency

items:
  strategy: line
  line:
    pattern: '^(\d{8})\s+TRU-(\S+)\s+(.+?)\s+(\d+)\s+KG\s+USD\s+([\d,]+\.\d{2})\s+([\d,]+\.\d{2})\s+([\d,]+\.\d{2})\s+0$'
    field_map:
      tariff_code: 1
      supplier_item_code: 2
      description: 3
      quantity: 4
      unit_price: 5
      line_total: 6
      po_total: 7
    types:
      quantity: integer
      unit_price: currency
      line_total: currency
      po_total: currency
    skip_patterns:
      - '^\d{4}-\d{3}\s+\S+\s+\w+ \d{1,2}, \d{4}'
      - '^SUBTOTAL'
      - '^GROUP VERIFICATION'
      - '^TOTAL INTERNAL FREIGHT'
      - '^TOTAL INSURANCE'
      - '^TOTAL OTHER COST'
      - '^TOTAL DEDUCTION'
      - '^ADJUSTMENTS'
      - '^NET TOTAL'
      - '^INVOICE TOTAL'
      - '^VARIANCE CHECK'

sections:
  items_start:
    - "Document Type"
  items_end:
    - "SUBTOTAL (GROUPED)"

validation:
  min_items: 1
  max_item_price: 10000