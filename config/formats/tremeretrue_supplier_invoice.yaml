name: Tremeretrue_Supplier_Invoice
version: "1.0"
description: "Tremeretrue supplier invoice with grouped items, internal freight, and cost breakdown"

detect:
  all_of:
    - "Document Type"
    - "PO Number"
    - "Supplier Invoice#"
  any_of:
    - "SUBTOTAL (GROUPED)"
    - "NET TOTAL"
    - "INVOICE TOTAL"

metadata:
