name: walmart
version: "1.1"
priority: 10
description: "Walmart.com order invoices"

# Detection patterns for Walmart invoices
detect:
  all_of: []
  any_of:
    - "walmart.com"
    - "Order details - Walmart"
    - "Walmart.com order number"
    - "Order#"
    - "Order #"
  none_of:
    - "amazon"

# Metadata extraction
metadata:
  invoice_number:
    patterns:
      - 'Order\s*#\s*(\d[\d\s-]+\d)'
      - 'Walmart\.com order number[:\s]*(\d[\d\s-]+\d)'
    required: true
  
  date:
    patterns:
      - '(\w+\s+\d+,\s+\d+)\s+order'
      - 'Order Placed[:\s]+(\w+\s+\d+,\s+\d+)'
  
  supplier_name:
    value: "Walmart"
  
  supplier_address:
    value: "1901 Highway 102 East, Bentonville, AR 72712, USA"
  
  subtotal:
    patterns:
      - 'Subtotal\s+\$?([\d,]+\.\d{2})'
    type: currency

  # Walmart "Total" is the final amount charged (after savings, tax, and
  # excluding refunded/canceled items). Use (?<!\w) to avoid matching "Subtotal".
  total:
    patterns:
      - '(?<!\w)Total\s+\$?([\d,]+\.\d{2})'
    type: currency

  tax:
    patterns:
      - 'Tax\s+\$?([\d,]+\.\d{2})'
    type: currency

  # Walmart "Savings" is rollback discounts already reflected in the displayed
  # per-item prices. It is NOT an additional deduction â€” the item prices shown
  # are post-rollback. Capturing it as 'discount' would double-count the savings
  # (once in the lower item prices, once as a deduction from the total).
  # Instead, capture it as 'savings' (informational only, not subtracted).
  savings:
    patterns:
      - 'Savings\s+-?\$?([\d,]+\.\d{2})'
    type: currency

# Item extraction
# Walmart OCR has two common layouts:
#   - Inline: "Product Name $49.97 Delivery instructions" (price mid-line)
#   - Standard: "Product Name Qty 1 $53.47" (price at line end)
# Use line strategy matching a price anywhere on the description line.
items:
  strategy: line

  line:
    # Match description with a dollar price (possibly mid-line in two-column OCR)
    # Pattern: (description) $price (optional trailing text)
    pattern: '^(.+?)\s+(?:\([^)]+\)\s+)?(?:Qty\s+(\d+)\s+)?\$([\d,]+\.\d{2})(?:\s|$)'

    skip_patterns:
      - 'Canceled\s+Qty'
      - 'Ending\s+in\s+\d+'
      - 'Return\s+eligible'
      - '\bSubtotal\b'
      - '\bTax\b'
      - '(?<!\w)Total\b'
      - '\bShipping\b'
      - '\bSavings\b'
      - '/ea\b'

    field_map:
      description: 1
      quantity: 2
      total_cost: 3

    types:
      quantity: integer
      total_cost: currency

    clean_fields:
      description:
        - pattern: '\s*\(Select for More Options\)\s*'
          replace: ''
        - pattern: '\s*\(Select for\s*[^)]*\)\s*'
          replace: ''
        - pattern: '\s*More from this order\s*'
          replace: ''

    generated_fields:
      quantity: 1
      sku: "WM-{index}"
      unit_cost: "total_cost / quantity"

# Section markers
sections:
  items_start:
    - "Items Ordered"
    - "Order details"
    - "Return eligible"
  items_end:
    - "Shipping Address"
    - "Payment information"
    - "Charge history"
    - "Subtotal"
    - "Order Total"

# When OCR spreads description/qty/price across multiple lines,
# distribute subtotal across extracted items.
balance_items: true

# OCR normalization
ocr_normalize:
  # Fix common OCR issues with prices
  - pattern: '\$\s+(\d+\.\d{2})'
    replace: '$\1'
    description: "Fix space between $ and price"
