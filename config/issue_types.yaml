# Issue / status / severity enum vocabulary.
# Anywhere pipeline code returns a status string or issue type, it MUST
# come from here. Prevents typo-drift ("succss" vs "success") and keeps
# the controlled vocabulary in one place.

_meta:
  purpose: "Controlled vocabulary for status, severity, and issue type strings"
  covers:
    - "Top-level pipeline status (success, error, warning, skipped)"
    - "Severity levels (info, warning, error, critical)"
    - "Validation outcomes (pass, fail, blocked, bypassed)"
    - "Issue categorization (missing_field, invalid_format, variance, ...)"
    - "Known/unknown sentinels ('UNKNOWN', 'unknown')"
  match_patterns:
    - "status"
    - "severity"
    - "issue_type"
    - "result"
    - "outcome"
    - "success"
    - "error"
    - "UNKNOWN"
  loader: "pipeline.config_loader:load_issue_types"
  examples:
    - "load_issue_types()['status']['SUCCESS'] -> 'success'"
    - "load_issue_types()['severity']['ERROR'] -> 'error'"
  update_checklist:
    - "Add the new enum here first; THEN use it from code"

version: "1.0.0"

# Pipeline run statuses (process_single_invoice, generate_bl_xlsx, etc.).
status:
  SUCCESS: "success"
  ERROR:   "error"
  WARNING: "warning"
  SKIPPED: "skipped"
  PARTIAL: "partial"

# Granular per-invoice processing statuses emitted by
# pipeline.workflow.batch.process_single_invoice. Distinct from the
# top-level status block above because batch.py needs to surface which
# pipeline stage failed (extract / parse / split / etc.) rather than
# just the boolean success/failure.
batch_run_status:
  PENDING:                "pending"
  COMPLETED:              "completed"
  EXTRACT_FAILED:         "extract_failed"
  PIPELINE_FAILED:        "pipeline_failed"
  SPLIT_FAILED:           "split_failed"
  COMPLETED_WITH_ERRORS:  "completed_with_errors"

# Severity levels for classification / validation issues.
severity:
  INFO:     "info"
  WARNING:  "warning"
  ERROR:    "error"
  CRITICAL: "critical"

# Validation outcomes.
validation:
  PASS:     "pass"
  FAIL:     "fail"
  BLOCKED:  "blocked"
  BYPASSED: "bypassed"

# Issue type categories used in classification reports.
issue_type:
  MISSING_FIELD:      "missing_field"
  INVALID_FORMAT:     "invalid_format"
  VARIANCE_HIGH:      "variance_high"
  VARIANCE_LOW:       "variance_low"
  DUPLICATE:          "duplicate"
  UNCLASSIFIED:       "unclassified"
  TARIFF_NOT_FOUND:   "tariff_not_found"
  SUPPLIER_NOT_FOUND: "supplier_not_found"
  BUNDLE_DETECTED:    "bundle_detected"

# Sentinel values for missing / unknown data.
unknown:
  UPPER: "UNKNOWN"
  LOWER: "unknown"
  NA:    "N/A"
  EMPTY: ""

# Pre-send checklist findings emitted by pipeline/xlsx_validator.py.
# Each entry maps a check kind to its severity, default hint, and any
# cell-column metadata. The validator reads this in lieu of an inline
# Python dict so behavior changes don't require code edits.
xlsx_validator:
  # Severity tag values reused across the validator's fail() invocations.
  severities:
    WARN:  "warn"
    BLOCK: "block"

  # Per-finding metadata. ``cell_column`` is the openpyxl column letter
  # (where the offending value lives) for findings emitted from
  # _inspect_xlsx_items. For findings without a single column origin
  # (item_*, email-params-level), cell_column is "".
  kinds:
    negative_invoice_total:
      kind:        "negative_invoice_total"
      severity:    "block"
      cell_column: "S"
      hint:        "InvoiceTotal must be > 0. Re-check the source invoice OCR."
    placeholder_sku:
      kind:        "placeholder_sku"
      severity:    "warn"
      cell_column: "I"
      hint:        "Format YAML is not extracting real SKUs — fall-back assigned ITEM-NNN. Check the format spec for this supplier (config/formats/<name>.yaml)."
    description_starts_with_tariff:
      kind:        "description_starts_with_tariff"
      severity:    "warn"
      cell_column: "J"
      hint:        "A WorkSheet PDF was likely processed as a source invoice. WorkSheets concatenate tariff codes and item descriptions; they are not invoice data."
    payment_line_as_item:
      kind:        "payment_line_as_item"
      severity:    "block"
      cell_column: "J"
      hint:        "Payment-method/Paypal lines must not be ingested as items. Add the payment-line marker to the format YAML skip rules."
    generic_purchase_description:
      kind:        "generic_purchase_description"
      severity:    "warn"
      cell_column: "J"
      hint:        "Description is a marketplace-name placeholder, not the actual product. Improve the format YAML so it captures the real product title from the PDF."
    description_too_short:
      kind:        "description_too_short"
      severity:    "warn"
      cell_column: "J"
      hint:        "Item description is too short to be a real product name. Re-check the format YAML and source PDF text extraction."
    garbage_description_pattern:
      kind:        "garbage_description_pattern"
      severity:    "warn"
      cell_column: "J"
      hint:        "Description is OCR garbage / keymash. Try a higher-resolution OCR pass on this page or update the format YAML."
    quantity_zero_with_cost:
      kind:        "quantity_zero_with_cost"
      severity:    "warn"
      cell_column: "K"
      hint:        "Quantity=0 with non-zero TotalCost indicates failed quantity extraction. Check the format YAML quantity capture group."
    duplicate_items_in_xlsx:
      kind:        "duplicate_items_in_xlsx"
      severity:    "warn"
      cell_column: "J"
      hint:        "Same item appears multiple times in one XLSX. May be legitimate (two of the same product) or duplicate extraction. Verify against source PDF."
    llm_auto_format_used:
      kind:        "llm_auto_format_used"
      severity:    "warn"
      cell_column: ""
      hint:        "No format YAML matched — pipeline auto-generated extraction via LLM. Promote the auto-generated spec into a real config/formats/*.yaml so future invoices use deterministic extraction."
    client_declared_duties_missing:
      kind:        "client_declared_duties_missing"
      severity:    "block"
      cell_column: "P"
      hint:        "Client Declared Duties row is missing from the XLSX — declaration extraction failed. Re-run pdf_splitter.extract_declaration_handwriting on the source declaration PDF; if Tesseract captured a value with confusable characters (e.g. '7/.12'), pipeline.ocr_number_normalizer.normalize_ocr_number can recover it."
    client_declared_duties_variance_excessive:
      kind:        "client_declared_duties_variance_excessive"
      severity:    "block"
      cell_column: "P"
      hint:        "Client Declared Duties differs from Estimated Duties by more than the configured tolerance — likely an OCR / LLM-vision extraction error. Re-extract the declared value from the source PDF and verify against the broker's handwritten figure."
    consignee_unrecognised:
      kind:        "consignee_unrecognised"
      severity:    "block"
      cell_column: ""
      hint:        "The extracted consignee name does not match any rule in config/document_types.json. Either (a) the consignee is a first-time importer and a new rule should be added, or (b) the extraction is wrong and consignee_name needs manual correction in _email_params.json before send."
    invoice_total_mismatch:
      kind:        "invoice_total_mismatch"
      severity:    "block"
      cell_column: "S"
      hint:        "Sum of line items + adjustments does not reconcile to the stated invoice / Total Payment Amount captured from the source PDF. Items are likely missing, incorrectly priced, or a discount was double-applied. Re-check the parser output against the source invoice — every dollar must be accounted for."

  # Standalone messages used by email_params-level checks (not item-level).
  messages:
    man_reg_blank: "man_reg is blank. Manifest registration is required for ASYCUDA filing."

  # SKU sentinel: when the SKU column equals this string, treat the row
  # as a payment line (covers the FashionNova/PayPal payment-line variant
  # that doesn't trigger the keyword-substring check).
  payment_sku_sentinel: "PAYMENT"

  # Display widths used in finding-detail strings (NOT a tolerance —
  # purely cosmetic truncation of long descriptions for human readers).
  display:
    detail_truncation_width:        60
    duplicate_signature_desc_width: 40

  # Filename markers for combined / worksheet attachment detection.
  combined_xlsx_suffix:       "_combined.xlsx"
  combined_marker_underscore: "_combined"
  combined_marker_hyphen:     "-combined"
  worksheet_filename_infix:   "worksheet"

  # Sentinel "value" string for the quantity_zero_with_cost finding's
  # ``value`` field (the offending qty literal).
  qty_zero_value: "0"

  # Sample-size cap used when truncating example-rows lists in finding
  # detail messages (keeps the email body terse).
  finding_sample_cap: 5

  # Maximum number of WorkSheet-attachment basenames to inline in the
  # warning message (see ``worksheet_pdf_in_attachments``).
  worksheet_attachment_sample_cap: 3
