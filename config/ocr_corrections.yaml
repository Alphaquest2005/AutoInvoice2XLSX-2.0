# OCR correction dictionary.
# When PDF text extraction hits scanned / handwritten pages, common OCR
# misreads get normalized via these substitutions.

_meta:
  purpose: "OCR misread corrections for scanned/handwritten invoice pages"
  covers:
    - "Character-level substitutions ('O' ↔ '0', 'l' ↔ '1', ...)"
    - "Currency symbol recovery ('S' → '$', ...)"
    - "Tariff-code-specific fixups"
    - "Whitespace / punctuation normalization"
  match_patterns:
    - "ocr"
    - "correction"
    - "misread"
    - "fixup"
  loader: "pipeline.config_loader:load_ocr_corrections"
  examples:
    - "load_ocr_corrections()['numeric_chars']['O'] -> '0'"
  update_checklist:
    - "Run tests/pipeline/test_ocr_corrections.py if it exists"
    - "Add new misreads to learned_fixes cache rather than here when"
    - "  they are invoice-specific rather than universal"

version: "1.1.0"

# Character confusions in NUMERIC contexts only.
# These apply when we know the surrounding context is a number (tariff
# code, quantity, amount, declared duty). Never apply blindly to text fields.
numeric_chars:
  # Letter-shaped misreads of digits.
  O: "0"
  o: "0"
  Q: "0"
  D: "0"
  l: "1"
  I: "1"
  S: "5"      # sometimes; use with confidence check
  s: "5"
  B: "8"
  Z: "2"
  G: "6"
  # Punctuation-shaped misreads of "1" — observed in handwritten declaration
  # extraction (e.g. "71.12" OCR'd as "7/.12" on HAWB9685992).
  "/": "1"
  "|": "1"
  "(": "1"
  ")": "1"
  "{": "1"
  "}": "1"
  "[": "1"
  "]": "1"
  "!": "1"

# Decimal-point confusables. Comma can mean decimal (European fmt, "84,48")
# OR thousands separator ("1,234.56"). The normalizer disambiguates by:
#   - 1-2 trailing digits after the comma  → treat as decimal point
#   - 3 trailing digits + no other decimal → treat as thousands separator
#   - any decimal already present in token → comma is thousands separator
# The middle-dot "·" is unambiguously a decimal.
decimal_chars:
  ",": "."
  "·": "."

# Numeric-token recovery strategy used by
# pipeline/ocr_number_normalizer.py::normalize_ocr_number().
numeric_token_strategy:
  # The digits that constitute a valid number after substitution.
  digit_chars: "0123456789"
  # Strip these surrounding characters before parsing.
  strip_prefix_chars: "$€£¥ \t"
  strip_suffix_chars: "$€£¥ \t.,;:"
  # If first parse fails, attempt single-char substitutions from numeric_chars
  # then retry. Multi-char substitution is bounded to avoid combinatorial blowup.
  max_substitutions_per_token: 3
  min_token_length: 1
  max_token_length: 16
  # When a comma appears with this many trailing digits, treat it as a
  # thousands separator rather than a decimal point. (US fmt "1,234.56")
  thousands_separator_digit_count: 3

# Currency symbol recovery.
currency_symbols:
  S:   "$"
  USS: "US$"
  us$: "$"

# Tariff-code-specific fixups (only applied when 8-digit context is expected).
tariff_fixups:
  # Single-char replacements only valid within 8-digit tariff codes.
  enabled_when: "context == 'tariff_code'"

# Whitespace / punctuation normalization.
whitespace:
  collapse_runs: true
  trim_edges:    true
  normalize_nbsp: true
