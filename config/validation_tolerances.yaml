# Variance / validation tolerances.
# These are APPLICATION policy (what counts as "close enough") — NOT law.
# Changes affect whether an invoice passes variance_check.

_meta:
  purpose: "Variance and validation tolerances for invoice totals and row-level comparisons"
  covers:
    - "Max absolute variance vs stated invoice total"
    - "Max relative variance (fraction of invoice total)"
    - "Decimal rounding for currency comparisons"
    - "Floating-point equality epsilons"
    - "Row-count expectations (minimum items, maximum categories)"
  match_patterns:
    - "tolerance"
    - "epsilon"
    - "variance"
    - "threshold"
    - "round"
    - "decimal_places"
  loader: "pipeline.config_loader:load_validation_tolerances"
  examples:
    - "load_validation_tolerances()['variance_abs_max'] -> 0.02"
    - "load_validation_tolerances()['variance_rel_max'] -> 0.005"
  update_checklist:
    - "Run tests/pipeline/test_variance_analysis.py"
    - "Run tests/pipeline/test_xlsx_validator.py"

version: "1.0.0"

# Invoice-level variance: |calculated_total - stated_total|.
# variance_abs_max: absolute dollar tolerance.
# variance_rel_max: relative tolerance (0.005 = 0.5% of stated total).
variance_abs_max: 0.02
variance_rel_max: 0.005

# Currency display uses 2 decimals; internal math uses 4 for stability.
currency_decimals_display: 2
currency_decimals_internal: 4

# Floating-point "close enough" for non-currency comparisons.
float_epsilon: 0.0001

# Minimum row counts expected in a well-formed XLSX.
min_groups_per_invoice: 1
min_items_per_group: 1

# Ratios used by variance_fixer to detect bundles / double-counting.
bundle_variance_ratio_min: 0.2    # calculated/stated > 1.2 == suspicious
bundle_variance_ratio_max: 0.75   # upper bound for legit bundle patterns

# Reverse-calc tolerance when inferring CIF from declared duties.
# Below this, accept the declared value as authoritative; do NOT flag.
declared_duty_min_usd: 0.01

# added by Wave 1 for pipeline/bl_xlsx_generator.py
# Duty-variance warning threshold (USD). Above this a row is styled with the
# warning font to flag attention on the classification cross-check section.
duty_variance_warn_usd: 1.0

# added by Wave 1 for pipeline/bl_xlsx_generator.py
# CET rate mismatch threshold (absolute rate delta). Above this, the
# classification cross-check emits a "CET MISMATCH" warning.
cet_rate_mismatch_threshold: 0.02

# added by Wave 1 for pipeline/bl_xlsx_generator.py
# Item allocation tolerance (relative gap) for the reverse-calc CIF
# allocation check. Above this, the section flags OVER/UNDER allocation.
item_allocation_relative_gap: 0.35

# added by Wave 1 for pipeline/xlsx_generator.py
# Variance-check display threshold: if |variance| exceeds this the VARIANCE
# CHECK row is rendered with the red/error font; below it we show the
# green/verify font. Matches the 2-decimal display precision.
variance_display_epsilon: 0.01

# Placeholder / invalid PO-number sentinels — these are treated as "no PO
# present" even though they look populated. Any non-matching value is
# accepted as a real PO number.
invalid_po_sentinels:
  - ""
  - "Page"
  - "None"
  - "N/A"

# added by Wave 1 for pipeline/variance_checker.py
# Variance-checker scan parameters. The XLSX layout is 37 columns A..AK.
#   variance_value_col: column P (16) — where the label-row VARIANCE CHECK
#                       numeric value is written.
#   per_row_variance_col: column R (18) — per-invoice-row Variance column.
#   label_scan_max_col: scan columns A..O (1..15) when searching for the
#                       'VARIANCE CHECK' / 'GROUP VERIFICATION' label rows.
#   formula_error_scan_max_col: scan columns A..AN (1..40) for Excel error
#                       cells (#REF!, #VALUE!, ...).
#   formula_error_max_reported: cap error list shown to user.
#   non_zero_variance_max_reported: cap per-row variance warnings shown.
#   variance_epsilon_usd: dollar-level tolerance for variance pass/fail
#                       (0.001 ≈ sub-cent rounding noise).
variance_checker:
  variance_value_col: 16
  per_row_variance_col: 18
  label_scan_max_col: 15
  formula_error_scan_max_col: 40
  formula_error_max_reported: 10
  non_zero_variance_max_reported: 5
  variance_epsilon_usd: 0.001
  per_row_variance_first_data_row: 2

# added by Wave 1 for pipeline/workflow/variance_fixer.py
variance_fixer:
  # Residual-variance threshold (USD). If the LLM's per-row fixes leave a
  # gap larger than this, force the remainder into ADJUSTMENTS. Matches the
  # downstream combined-block 0.02 check.
  force_adjustment_threshold_usd: 0.02
  # Green/red font switch threshold for the VARIANCE CHECK row.
  variance_row_green_threshold: 0.01
  # Group-header rewrite threshold (rounded to 2dp).
  group_header_rewrite_threshold: 0.005

# ── Client-declared-duties variance check (added 2026-04-27) ──
# When |declared - estimated| / max(estimated, 1) exceeds this ratio,
# the xlsx_validator emits a block-severity finding. Threshold tuned
# against HAWB9686021 (LLM-vision misread '$426.22' as '1426.22' →
# 511% variance, well above the threshold) while letting routine
# brokers' rounding (≤ 50%) through with no block.
client_declared_duties_variance_max_ratio: 0.50
